<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      console.log(`Items (${2 + 2}): $${(2 * 20.95 + 2 * 7.99).toFixed(2)}`);
      console.log(`Shipping and handling: $${2 * 4.99}`);
      console.log(
        `Total before tax: $${(2 * 20.95 + 2 * 7.99 + 2 * 4.99).toFixed(2)}`
      );
      console.log(
        `Estimated tax (${10})%: $${(Math.round(2 * 20.95 + 2 * 7.99 + 2 * 4.99) * 0.1).toFixed(2)}`
      );
      console.log(
        `Order Total: ${(2 * 20.95 + 2 * 7.99 + 2 * 4.99 + (2 * 20.95 + 2 * 7.99 + 2 * 4.99) * 0.1).toFixed(2)}`
      );
    </script>
  </body>
</html>
